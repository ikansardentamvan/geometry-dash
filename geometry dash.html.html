<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometry Dash Inspired</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
      background: linear-gradient(to bottom, #0f172a, #020617);
      color: white;
    }

    canvas {
      display: block;
      background: linear-gradient(to bottom, #1e293b, #0f172a);
    }

    .ui {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      color: #38bdf8;
      text-shadow: 0 0 10px #38bdf8;
    }

    .info {
      margin-top: 8px;
      font-size: 16px;
    }

    .center {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 20;
      background: rgba(0,0,0,0.45);
    }

    button {
      margin-top: 18px;
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: #38bdf8;
      color: black;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }

    button:hover {
      transform: scale(1.05);
      background: #7dd3fc;
    }
  </style>
</head>
<body>
  <div class="ui">
    <div class="title">Geometry Dash by alfatha</div>
    <div class="info">Tekan SPACE / Klik untuk melompat</div>
    <div class="info">Score: <span id="score">0</span></div>
  </div>

  <div class="center" id="menu">
    <h1 style="font-size:48px; margin-bottom:10px;">🚀 GEOMETRY DASH!</h1>
    <p>Hindari rintangan dan dapatkan skor tertinggi.</p>
    <button onclick="startGame()">Mulai Game</button>
  </div>

  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const gravity = 0.9;
    const groundHeight = 120;

    let gameSpeed = 7;
    let score = 0;
    let gameRunning = false;

    const player = {
      x: 120,
      y: 0,
      width: 50,
      height: 50,
      velocityY: 0,
      jumpForce: -17,
      grounded: false,
      rotation: 0
    };

    const obstacles = [];

    function resetPlayer() {
      player.y = canvas.height - groundHeight - player.height;
      player.velocityY = 0;
      player.rotation = 0;
    }

    resetPlayer();

    function spawnObstacle() {
      const size = Math.random() * 40 + 35;

      obstacles.push({
        x: canvas.width + 50,
        y: canvas.height - groundHeight - size,
        width: size,
        height: size
      });
    }

    function jump() {
      if (player.grounded && gameRunning) {
        player.velocityY = player.jumpForce;
        player.grounded = false;
      }
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        jump();
      }
    });

    window.addEventListener('mousedown', jump);
    window.addEventListener('touchstart', jump);

    function drawPlayer() {
      ctx.save();

      ctx.translate(
        player.x + player.width / 2,
        player.y + player.height / 2
      );

      ctx.rotate(player.rotation);

      ctx.fillStyle = '#38bdf8';
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#38bdf8';

      ctx.fillRect(
        -player.width / 2,
        -player.height / 2,
        player.width,
        player.height
      );

      ctx.restore();
    }

    function drawGround() {
      ctx.fillStyle = '#111827';
      ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);

      ctx.fillStyle = '#38bdf8';

      for (let i = 0; i < canvas.width; i += 40) {
        ctx.fillRect(i, canvas.height - groundHeight, 20, 6);
      }
    }

    function drawObstacles() {
      ctx.fillStyle = '#f43f5e';

      obstacles.forEach((obs) => {
        ctx.beginPath();
        ctx.moveTo(obs.x, obs.y + obs.height);
        ctx.lineTo(obs.x + obs.width / 2, obs.y);
        ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
        ctx.closePath();

        ctx.shadowBlur = 20;
        ctx.shadowColor = '#f43f5e';
        ctx.fill();
      });
    }

    function updatePlayer() {
      player.velocityY += gravity;
      player.y += player.velocityY;

      if (player.y + player.height >= canvas.height - groundHeight) {
        player.y = canvas.height - groundHeight - player.height;
        player.velocityY = 0;
        player.grounded = true;
        player.rotation = 0;
      } else {
        player.rotation += 0.1;
      }
    }

    function updateObstacles() {
      obstacles.forEach((obs, index) => {
        obs.x -= gameSpeed;

        if (obs.x + obs.width < 0) {
          obstacles.splice(index, 1);
          score++;
          document.getElementById('score').textContent = score;

          if (score % 5 === 0) {
            gameSpeed += 0.5;
          }
        }

        // Collision
        if (
          player.x < obs.x + obs.width &&
          player.x + player.width > obs.x &&
          player.y < obs.y + obs.height &&
          player.y + player.height > obs.y
        ) {
          endGame();
        }
      });
    }

    function drawBackgroundParticles() {
      for (let i = 0; i < 50; i++) {
        ctx.fillStyle = 'rgba(255,255,255,0.08)';

        const x = (i * 200 - (Date.now() * 0.05)) % (canvas.width + 200);
        const y = (i * 97) % canvas.height;

        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function gameLoop() {
      if (!gameRunning) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBackgroundParticles();
      drawGround();
      updatePlayer();
      updateObstacles();
      drawObstacles();
      drawPlayer();

      requestAnimationFrame(gameLoop);
    }

    let obstacleInterval;

    function startGame() {
      document.getElementById('menu').style.display = 'none';

      score = 0;
      gameSpeed = 7;
      obstacles.length = 0;

      document.getElementById('score').textContent = score;

      resetPlayer();

      gameRunning = true;

      clearInterval(obstacleInterval);

      obstacleInterval = setInterval(() => {
        spawnObstacle();
      }, 1300);

      gameLoop();
    }

    function endGame() {
      gameRunning = false;
      clearInterval(obstacleInterval);

      const menu = document.getElementById('menu');
      menu.style.display = 'flex';

      menu.innerHTML = `
        <h1 style="font-size:52px; color:#f43f5e;">GAME OVER</h1>
        <p style="margin-top:10px; font-size:22px;">Score Kamu: <b>${score}</b></p>
        <button onclick="reloadGame()">Main Lagi</button>
      `;
    }

    function reloadGame() {
      location.reload();
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      resetPlayer();
    });
  </script>
</body>
</html>
